name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build (subpath base for project Pages)
        working-directory: web
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      # Blueprint §8: CI asserts a subpath build — retrofitting base paths is
      # the classic Pages failure mode.
      - name: Assert base path in build output
        run: |
          test -f web/build/index.html
          grep -q "/${{ github.event.repository.name }}/_app" web/build/index.html
          # no root-absolute /_app or /data URLs may bypass the base path
          ! grep -qE '(href|src)="/(_app|data)' web/build/index.html

      # The R0 data contract must ship with the site (web/static/data is
      # committed pipeline output — a stray gitignore once ate it silently).
      - name: Assert data contract files in build output
        run: |
          for f in meta.json groups.json group_ids.u16 attrs.u8 ledger.json payoff/ch1.json; do
            test -f "web/build/data/$f" || { echo "missing web/build/data/$f"; exit 1; }
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
